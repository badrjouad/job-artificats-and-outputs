name: Deploy website
on:
  push:
    branches:
      - main

# Global env variables - available to ALL jobs
env:
  APP_VERSION: 1.0.0
  API_VERSION: v2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint
      - name: Test code
        run: npm run test
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      script-file: ${{ steps.publish.outputs.script-file }}
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build
      - name: Publish JS filename
        id: publish
        run: find dist/assets/*.js -type f -execdir echo 'script-file={}' >> $GITHUB_OUTPUT ';'
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Job-level env variable - available to all steps in this job only
    env:
      NODE_ENV: production
      DEPLOY_TARGET: aws-s3
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
      - name: Output filename
        run: echo "${{ needs.build.outputs.script-file }}"
      - name: Print env variables
        run: |
          echo "==============================="
          echo "APP_VERSION = $APP_VERSION"
          echo "API_VERSION = $API_VERSION"
          echo "NODE_ENV = $NODE_ENV"
          echo "DEPLOY_TARGET = $DEPLOY_TARGET"
          echo "==============================="
      - name: Deploy
        env:
          # Secret: the actual API key value (encrypted, never visible in logs)
          # Env var: the API version (visible, not sensitive)
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Deploying version $APP_VERSION to $DEPLOY_TARGET..."
          echo "Calling API endpoint: https://api.example.com/$API_VERSION/deploy"
          echo "API_KEY is set: ${{ secrets.API_KEY != '' }}"
          # In real life you'd use it like:
          # curl -X POST https://api.example.com/$API_VERSION/deploy \
          #   -H "Authorization: Bearer $API_KEY"
