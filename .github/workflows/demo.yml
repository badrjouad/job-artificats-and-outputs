name: Deploy website
on:
  push:
    branches:
      - main

# Global env variables - available to ALL jobs
env:
  APP_VERSION: 1.0.0

jobs:
  test:
    runs-on: ubuntu-latest
    # Spin up a real PostgreSQL database for the test job
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ vars.DB_NAME }}
          POSTGRES_USER: ${{ vars.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    # DB connection env variables available to all steps in this job
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ${{ vars.DB_NAME }}
      DB_USER: ${{ vars.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Print DB connection info
        run: |
          echo "==============================="
          echo "DB_HOST    = $DB_HOST"
          echo "DB_PORT    = $DB_PORT"
          echo "DB_NAME    = $DB_NAME"
          echo "DB_USER    = $DB_USER"
          echo "DB_PASSWORD is set: ${{ secrets.DB_PASSWORD != '' }}"
          echo "==============================="
      - name: Lint code
        run: npm run lint
      - name: Test code
        run: npm run test
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      script-file: ${{ steps.publish.outputs.script-file }}
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build
      - name: Publish JS filename
        id: publish
        run: find dist/assets/*.js -type f -execdir echo 'script-file={}' >> $GITHUB_OUTPUT ';'
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Job-level env variable - available to all steps in this job only
    env:
      NODE_ENV: production
      DEPLOY_TARGET: aws-s3
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
      - name: Output filename
        run: echo "${{ needs.build.outputs.script-file }}"
      - name: Print env variables
        run: |
          echo "==============================="
          echo "APP_VERSION = $APP_VERSION"
          echo "API_VERSION (from vars) = ${{ vars.API_VERSION }}"
          echo "NODE_ENV = $NODE_ENV"
          echo "DEPLOY_TARGET = $DEPLOY_TARGET"
          echo "==============================="
      - name: Deploy
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_VERSION_SECRET: ${{ secrets.API_VERSION }}
        run: |
          echo "Deploying version $APP_VERSION to $DEPLOY_TARGET..."
          echo "Calling API endpoint: https://api.example.com/${{ vars.API_VERSION }}/deploy"
          echo "API_KEY is set: ${{ secrets.API_KEY != '' }}"
          echo "API_VERSION secret is set: ${{ secrets.API_VERSION != '' }}"
          # In real life:
          # curl -X POST https://api.example.com/${{ vars.API_VERSION }}/deploy \
          #   -H "Authorization: Bearer $API_KEY" \
          #   -H "X-Api-Version: $API_VERSION_SECRET"
